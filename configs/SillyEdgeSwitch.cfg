! --- Uplinks ---
interface GigabitEthernet0/1
 description Uplink to SillySwitch
 switchport trunk native vlan 67
 switchport trunk allowed vlan 10,20,30,67
 switchport mode trunk
 switchport nonegotiate
 spanning-tree link-type point-to-point
!
interface GigabitEthernet0/2
 description AP Trunk
 switchport trunk native vlan 67
 switchport trunk allowed vlan 10,20,30,67
 switchport mode trunk
 switchport nonegotiate
 storm-control broadcast level 1.00
 spanning-tree portfast trunk
!
interface Vlan1
 no ip address
 shutdown
!
interface Vlan67
 description Management VLAN
 ip address 172.16.67.5 255.255.255.240
!
ip default-gateway 172.16.67.1
!
no ip http server
no ip http secure-server
!
ip access-list standard MGMT-ONLY
 permit 100.83.36.66
 permit 172.16.67.0 0.0.0.15
 deny   any log
!
line con 0
line vty 0 4
 access-class MGMT-ONLY in
 login authentication VTY-LOCAL
 transport input ssh
line vty 5 15
 access-class MGMT-ONLY in
 login authentication VTY-LOCAL
 transport input ssh
!
end
