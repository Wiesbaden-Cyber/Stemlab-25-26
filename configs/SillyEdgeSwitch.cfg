! SillyEdgeSwitch - Cisco Catalyst 2960
! IOS Version 15.0(2)SE11
! Last change: 2026-03-23 (clock not synced — shows 1993)
! Retrieved: 2026-03-23
!
version 15.0
no service pad
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname SillyEdgeSwitch
!
username admin privilege 15 secret 5 $1$neVH$fgUm7hZB7ltlBqmimkXsi/
username readonly secret 5 $1$4CjB$JxcEXihhTV//sepgQ5Bke.
!
aaa new-model
aaa authentication login default local
aaa authentication login VTY-LOCAL local
aaa authorization exec default local
aaa session-id common
!
system mtu routing 1500
vtp domain TMW
vtp mode transparent
!
ip domain-name silly.lab.local
ip name-server 1.1.1.1
ip name-server 8.8.8.8
!
spanning-tree mode pvst
spanning-tree extend system-id
!
vlan 10
 name Lab
!
vlan 20
 name Classroom
!
vlan 30
 name Guest
!
vlan 67
 name Management
!
ip ssh version 2
!
! --- Classroom PC Ports (VLAN 20) ---
interface FastEthernet0/1
 description Classroom PC
 switchport access vlan 20
 switchport mode access
 spanning-tree portfast
 spanning-tree bpduguard enable
!
interface FastEthernet0/2
 description Classroom PC
 switchport access vlan 20
 switchport mode access
 spanning-tree portfast
 spanning-tree bpduguard enable
