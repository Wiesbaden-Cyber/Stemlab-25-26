# SillyProxmox - Proxmox VE 9.1.4 (kernel 6.17.4-2-pve)
# Hostname: pve | 24 cores, 96 GB RAM
# Retrieved: 2026-03-23

# /etc/network/interfaces

auto lo
iface lo inet loopback

# Physical NICs (dual-port NIC)
auto enp8s0f0
iface enp8s0f0 inet manual

auto enp8s0f1
iface enp8s0f1 inet manual

# vmbr0 — DHCP bridge via enp8s0f0 (Lab VLAN untagged access)
auto vmbr0
iface vmbr0 inet dhcp
    bridge-ports enp8s0f0
    bridge-stp off
    bridge-fd 0

# vmbr1 — VLAN-aware trunk bridge via enp8s0f1
# Static IP on Management VLAN 67. Carries tagged traffic for VMs (VLANs 10/20/30/67)
auto vmbr1
iface vmbr1 inet static
    address 172.16.67.3/28
    gateway 172.16.67.1
    bridge-ports enp8s0f1
    bridge-stp off
    bridge-fd 0
    bridge-vlan-aware yes
    bridge-vids 2-4094

# vmbr2 — Isolated internal bridge (no physical uplink)
# Used for OPNsense VLAN testing. Will be remapped to vmbr1 once validated.
auto vmbr2
iface vmbr2 inet manual
    bridge-ports none
    bridge-stp off
    bridge-fd 0
    bridge-vlan-aware yes
    bridge-vids 2-4094
