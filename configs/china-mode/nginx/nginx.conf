# nginx — China Mode geo-spoof proxy
# Injects Chinese headers into HTTP traffic from VLAN 20
# Deployed in CT 200 (172.16.20.21), listens on port 80
# Upstream traffic forwarded with CN identity headers

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/china-mode-access.log;
    error_log  /var/log/nginx/china-mode-error.log;

    # -------------------------------------------------------------------------
    # Geo-spoof headers injected into all proxied requests
    # Simulates a browser in mainland China
    # -------------------------------------------------------------------------
    proxy_set_header X-Forwarded-For     "61.135.169.125";   # Beijing CN IP (Baidu datacenter range)
    proxy_set_header X-Real-IP           "61.135.169.125";
    proxy_set_header Accept-Language     "zh-CN,zh;q=0.9,en;q=0.1";
    proxy_set_header Accept-Charset      "utf-8, gbk;q=0.7, *;q=0.3";
    proxy_set_header CF-IPCountry        "CN";
    proxy_set_header X-Country-Code      "CN";
    proxy_set_header X-Region            "Beijing";

    # -------------------------------------------------------------------------
    # Transparent HTTP proxy — catch-all for port 80
    # -------------------------------------------------------------------------
    server {
        listen 80 default_server;
        server_name _;

        # Resolve upstream host dynamically
        resolver 172.16.20.20 223.5.5.5 223.6.6.6 valid=30s;

        location / {
            proxy_pass http://$http_host$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host            $http_host;
            proxy_set_header Connection      "";
            proxy_set_header X-Forwarded-For "61.135.169.125";
            proxy_set_header Accept-Language "zh-CN,zh;q=0.9,en;q=0.1";
            proxy_set_header CF-IPCountry    "CN";

            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }
    }

    # -------------------------------------------------------------------------
    # China Mode status page (accessible at http://172.16.20.21)
    # -------------------------------------------------------------------------
    server {
        listen 8888;
        server_name _;

        location / {
            default_type text/html;
            return 200 '<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>中国互联网 - China Mode Active</title>
<style>body{background:#de2910;color:#ffde00;font-family:sans-serif;text-align:center;padding:60px;}
h1{font-size:3em;}p{font-size:1.2em;}</style></head>
<body><h1>&#127464;&#127475; China Mode is ACTIVE</h1>
<p>VLAN 20 is operating under simulated Great Firewall restrictions.</p>
<p>DNS: Pi-hole @ 172.16.20.21 | Upstream: Alibaba 223.5.5.5</p>
<p>&#20013;&#22269;&#30340;&#32593;&#32476;&#23601;&#26159;&#36825;&#26679;&#30340;&#12290;</p>
</body></html>';
        }
    }
}
